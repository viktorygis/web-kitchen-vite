<!DOCTYPE html>
<html lang="ru">
    @@include('../html/head.html', { "title": "Задачи: Операторы", "description": "Задачи: Операторы" })
    <body>
        <div class="wrapper">
            @@include('../html/header.html', {})
            <main class="page">
                <section class="section">
                    <div class="container">
                        <h1>1. Операторы</h1>
                    </div>
                </section>
            </main>
            @@include('../html/footer.html', {})
        </div>
        @@include('../html/popup.html', {}) @@include('../html/js.html', {})
        <script>
            "use strict";
            //------------------------------------------------------------------------------------------
            //Арифметические операторы
            //-----------------------------

            //Сложение
            let a = 10;
            let b = 40;
            let sum = a + b;
            console.log(`Сложение чисел: ${sum}`);

            //-----------------------------

            //Вычитание
            let f = b - a;
            console.log(`Вычитание чисел: ${f}`);

            //-----------------------------

            //Умножение
            let y = a * b;
            console.log(`Умножение чисел: ${y}`);

            //-----------------------------

            //Деление
            let d = b / a;
            console.log(`Деление чисел: ${d}`);

            //-----------------------------

            //Остаток от деления
            let remainder = b % a;
            console.log(`Остаток от деления(40/10): ${remainder}`);

            let remainder02 = 40 % 7;
            console.log(`Остаток от деления(40/7): ${remainder02}`);
            //Этот оператор особенно полезен, когда нужно проверить, делится ли число нацело (например, чётное или нечётное).

            //------------------------------------------------------------------------------------------
            //Операторы сравнения
            //-----------------------------

            //Оператор больше
            console.log(`Оператор больше (10 > 2): ${10 > 2}`); //true

            //-----------------------------

            // Оператор меньше
            console.log(`Оператор меньше (30 < 5): ${30 < 5}`); //false

            //-----------------------------

            //Оператор больше или равно
            console.log(`Оператор больше или равно (10 >= 10): ${10 >= 10}`); //true

            //-----------------------------

            // Оператор меньше или равно
            console.log(`Оператор меньше или равно (30 <= 5): ${30 <= 5}`); //false

            //-----------------------------

            // Оператор равно (нестрогое равенство)
            //Сравнивает значения без учёта типа данных.
            //Если типы разные, JavaScript попытается преобразовать их к одному типу перед сравнением.
            console.log(`Оператор равно (30 == 5): ${30 == 5}`); //false
            console.log(`Оператор равно (30 == "30"): ${30 == "30"}`); //true

            //-----------------------------

            // Оператор строго равно (с учётом типа данных)
            //Сравнивает значения с учётом типа данных.
            // Если типы разные, возвращает false без попытки преобразования.
            console.log(`Оператор строго равно (30 === 5): ${30 === 5}`); //false
            console.log(`Оператор строго равно (30 === "30"): ${30 === "30"}`); //false

            //-----------------------------

            // нестрогое неравенство
            //Проверяет, что значения не равны без учёта типа данных.
            //Если типы разные, JavaScript попытается преобразовать их к одному типу перед сравнением.
            console.log(`Оператор нестрогое неравенство (5!= "5"): ${5 != "5"}`); // false, потому что "5" преобразуется в число

            //-----------------------------

            // строгое  неравенство
            //Проверяет, что значения не равны без учёта типа данных.
            //Если типы разные, JavaScript попытается преобразовать их к одному типу перед сравнением.
            console.log(`Оператор строгое неравенство (5 !== "5"): ${5 !== "5"}`); // true, потому что типы разные (число и строка)

            //------------------------------------------------------------------------------------------
            //Логические операторы
            //-----------------------------

            //Логическое И
            //Вернёт true, только если оба условия истинны.
            let isStudent = true;
            let hasDiscount = true;
            console.log(`Логическое И (isStudent && hasDiscount): ${isStudent && hasDiscount}`); // true, потому что оба условия истинны

            //-----------------------------

            //Логическое ИЛИ
            //Вернёт true, если хотя бы одно условие истинно
            let isMom = false;
            console.log(`Логическое ИЛИ (isStudent || isMom): ${isStudent || isMom}`); // true, потому что одно условие истинно

            //-----------------------------

            //Логическое НЕ
            //Инвертирует значение. Если было true, станет false, и наоборот.
            console.log(`Логическое НЕ (!isStudent): ${!isStudent}`); // false, потому что мы "перевернули" true

            //------------------------------------------------------------------------------------------
            //Комбинирование операторов
            //Ты можешь объединять арифметические, логические и операторы сравнения, чтобы создавать сложные и мощные выражения.
            //-----------------------------
            let temperature = 25;
            let isSummer = true;
            let isHot = temperature > 30 && isSummer; // false, потому что температура не больше 30
            console.log(isHot); // Выведет: false

            //-----------------------------
            let price = 100;
            let discount = 20;
            let finalPrice = price - discount;
            let canAfford = finalPrice <= 80 && discount > 10; // true, потому что finalPrice = 80 и discount > 10
            console.log(canAfford); // Выведет: true

            //-----------------------------

            let age = 22;
            let result = age > 20 && isStudent;
            console.log("Результат:", result); // Выведи результат
        </script>
    </body>
</html>
