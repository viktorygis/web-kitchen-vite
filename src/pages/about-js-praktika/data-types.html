<!DOCTYPE html>
<html lang="ru">
    @@include('../html/head.html', { "title": "Задачи: Типы данных", "description": "Задачи: Типы данных" })
    <body>
        <div class="wrapper">
            @@include('../html/header.html', {})
            <main class="page">
                <section class="section">
                    <div class="container">
                        <h1>1. Типы данных</h1>
                    </div>
                </section>
            </main>
            @@include('../html/footer.html', {})
        </div>
        @@include('../html/popup.html', {}) @@include('../html/js.html', {})
        <script>
            "use strict";

            //------------------------

            //Строки — это текст, заключённый в кавычки.
            let name = "Вика";
            console.log(`Строка: ${name}`);
            console.log(`Тип данных: ${typeof name}`); //string

            //Объединение строк
            let fullName = "Вика" + " " + "Гомонова";
            console.log(`Объединение строк: ${fullName}`);

            //------------------------

            //Числа
            let age = 38;
            console.log(`Число: ${age}`);
            console.log(`Тип данных: ${typeof age}`); //number

            //Дробное число
            let price = 99.99;
            console.log(`Дробное число: ${price}`);
            //Числа можно использовать для математических операций: сложения, вычитания, умножения и деления.

            //Вычитание чисел
            let discount = 20;
            let finalPrice = price - discount;
            console.log(`Вычитание чисел: ${finalPrice}`);

            //------------------------

            //Логические значения
            let isMom = true;
            console.log(`Логическое значение, правда: ${isMom}`);
            let hasDiscount = false;
            console.log(`Логическое значение, ложь: ${hasDiscount}`);
            console.log(`Тип данных: ${typeof isMom}`); //boolean

            //------------------------

            //undefined - переменная объявлена, но не инициализированна, не присвоено значение
            let x;
            console.log(`Переменная не инициализирована: ${x}`);
            console.log(`Тип данных: ${typeof x}`); //undefined

            //------------------------

            //null - означает НИЧЕГО
            let y = null;
            console.log(`Переменная null: ${y}`);
            //Используется:
            //  Когда ты хочешь явно указать, что переменная пуста.
            // Например, если ты удаляешь данные из переменной и хочешь показать, что она больше не хранит значения.
            console.log(`Тип данных: ${typeof y}`); //object - Историческая ошибка
            if (y === null) {
                console.log("Это null");
            } //Это null
            //------------------------
        </script>
    </body>
</html>
