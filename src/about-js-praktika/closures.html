<!DOCTYPE html>
<html lang="ru">
    @@include('../partials/head.html', { "title": "Задачи: Замыкания", "description": "Задачи: Замыкания" })
    <body>
        <div class="wrapper">
            @@include('../partials/header.html', {})
            <main class="page">
                <section class="section">
                    <div class="container">
                        <h1>1. Замыкания</h1>
                    </div>
                </section>
            </main>
            @@include('../partials/footer.html', {})
        </div>
        @@include('../partials/popup.html', {}) @@include('../partials/js.html', {})
        <script>
            "use strict";
            //Лексическое окружение - это набор переменных, которые были доступны в момент создания функции.
            //Замыкания это	функции, которые могут запоминать своё лексическое окружение даже после того, как они были вызваны.
            //Замыкания позволяют создавать функции, которые могут использовать переменные из внешнего контекста, даже если этот контекст уже не существует.
            //Это полезно для создания приватных переменных и функций, которые не доступны из	глобального контекста.

            //это пример кода для замыкания
            //sayHello - это функция, которая создаёт лексическое окружение
            //message - это переменная, которая хранит строку "Hello, World!"
            function sayHello() {
                const message = "Hello, World!";
                console.log(message);
            }
            sayHello(); // Вывод: Hello, World!

            //-----------
            //Это пример кода для замыкания
            //outer - это внешняя функция, которая создаёт лексическое окружение
            //inner - это внутренняя функция, которая замыкает это окружение
            //myFunction - это переменная, которая хранит ссылку на внутреннюю функцию
            //Когда мы вызываем myFunction(), она имеет доступ к переменной message, которая была
            //создана в лексическом окружении outer, даже после того, как outer закончила свою работу.
            //Это позволяет inner использовать переменную message, которая недоступна из глобального контекстa.
            function outer() {
                const message = "Я замыкание!";

                return function inner() {
                    console.log(message);
                };
            }

            const myFunction = outer(); // outer закончила работу
            myFunction(); // "Я замыкание!" (но inner помнит message!)

            //----------
            //Это пример кода для замыкания
            //createGreeting - это функция, которая создаёт лексическое окружение
            //name - это параметр, который хранит имя пользователя
            //greet - это переменная, которая хранит ссылку на внутреннюю функцию
            //Когда мы вызываем greet(), она имеет доступ к переменной name, которая была
            //создана в лексическом окружении createGreeting, даже после того,
            //как createGreeting закончила свою работу.
            //Это позволяет greet использовать переменную name, которая недоступна из глобального контекста.
            function createGreeting(name) {
                return function () {
                    console.log("Hello, " + name);
                };
            }

            const greet = createGreeting("Alice");
            greet(); // Вывод: Hello, Alice
            //----------

            //Это пример кода для замыкания
            //outer2 - это внешняя функция, которая создаёт лексическое окружение
            //name - это переменная, которая хранит строку "Frontend"
            //inner2 - это внутренняя функция, которая замыкает это окружение
            //closure - это переменная, которая хранит ссылку на внутреннюю функцию
            //Когда мы вызываем closure(), она имеет доступ к переменной name, которая была
            //создана в лексическом окружении outer2, даже после того, как outer2 закончила свою работу.
            //Это позволяет inner2 использовать переменную name, которая недоступна из глобального контекста.
            function outer2() {
                const name = "Frontend";

                return function inner2() {
                    console.log(name);
                };
            }

            const closure = outer2();
            closure(); // "frontend"

            //----------

            //Это пример кода для замыкания
            //counter - это функция, которая создаёт лексическое окружение
            //count - это переменная, которая хранит текущее значение счётчика
            //increment - это внутренняя функция, которая замыкает это окружение
            //Когда мы вызываем increment(), она имеет доступ к переменной count, которая была
            //создана в лексическом окружении counter, даже после того, как
            //counter закончила свою работу.
            //Это позволяет increment использовать переменную count, которая недоступна из глобального контекста.
            function counter() {
                let count = 0;

                return function increment() {
                    count++;
                    console.log("Текущий счётчик:", count);
                };
            }
            const increment = counter();
            increment(); // Текущий счётчик: 1
            increment(); // Текущий счётчик: 2
            increment(); // Текущий счётчик: 3
            increment(); // Текущий счётчик: 4

            //----------
            //Это пример кода для замыкания в реальном приложении
            //createCounter - это функция, которая создаёт лексическое окружение
            //initialValue - это параметр, который хранит начальное значение счётчика
            //counter - это внутренняя функция, которая замыкает это окружение
            //Когда мы вызываем counter(), она имеет доступ к переменной initialValue, которая была
            //создана в лексическом окружении createCounter, даже после того,
            //как createCounter закончила свою работу.
            //Это позволяет counter использовать переменную initialValue, которая недоступна из глобального	контекста.
            /*   function createCounter(initialValue) {
                let count = initialValue;

                return function counter() {
                    count++;
                    console.log("Текущий счётчик:", count);
                };
            }
            const myCounter = createCounter(10);
            myCounter(); // Текущий счётчик: 11
            myCounter(); // Текущий счётчик: 12 */
            //зачем это нужно?
            //Это позволяет создавать функции, которые могут использовать переменные из внешнего контекста,
            //даже если этот контекст уже не существует.

            //----------
            //Представь, что тебе нужно сохранить данные или состояние между вызовами функции. Например, счётчик, который увеличивается каждый раз, когда ты
            //вызываешь функцию. Замыкания с этим справляются идеально!
            //	Создаём функцию, которая возвращает другую функцию-счётчик
            //Это пример кода для замыкания
            //createCounter - это функция, которая создаёт лексическое окружение
            //count - это переменная, которая хранит текущее значение счётчика
            //Возвращаемая функция увеличивает значение счётчика при каждом вызове
            //			//Когда мы вызываем counter(), она имеет доступ к переменной count, которая была
            //создана в лексическом окружении createCounter, даже после того,
            //как createCounter закончила свою работу.
            //Это позволяет counter использовать переменную count, которая недоступна из глобального конт
            function createCounter() {
                let count = 0; // Сохраняем состояние внутри функции

                return function () {
                    count++; // Увеличиваем при каждом вызове
                    console.log(`Счётчик: ${count}`);
                };
            }

            const counter = createCounter(); // Создаём счётчик
            counter(); // "Счётчик: 1"
            counter(); // "Счётчик: 2"
            counter(); // "Счётчик: 3"
        </script>
    </body>
</html>
